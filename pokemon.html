<!DOCTYPE html>
<html>
<head>
<title>Pokémon Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gbc.css">
<style>
body{margin:0;padding:25px;background:#7a0015;font-family:Arial,sans-serif;}
.pokedex{max-width:1600px;margin:auto;background:#d60028;border:10px solid #7a0015;border-radius:30px;padding:25px;}
h1{text-align:center;color:white;font-family:'Press Start 2P';margin-bottom:30px;}
.back{display:inline-block;padding:12px 20px;background:#222;color:white;text-decoration:none;border-radius:10px;margin-bottom:20px;}
#cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;}
.card{background:white;border-radius:12px;padding:15px;text-align:center;cursor:pointer;}
.card img{width:100%;max-width:220px;}
.set{color:#666;margin-top:8px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;justify-content:center;align-items:center;padding:20px;}
.modal-content{background:white;max-width:500px;width:100%;border-radius:15px;padding:20px;text-align:center;}
.modal-content img{width:100%;max-width:350px;}
.close{float:right;font-size:30px;cursor:pointer;}
.owned{background:#28a745;color:white;border:none;padding:12px 20px;border-radius:8px;margin-top:15px;font-size:16px;}
</style>
</head>
<body>

<div class="pokedex gbc-screen">
<a href="index.html" class="back">← Back to Pokédex</a>
<h1 id="title">Loading...</h1>
<div id="cards"></div>

<div class="premium-locked">

    <h3>PREMIUM FEATURES</h3>

    <div class="lock-line"></div>

    <p>🔒 COLLECTION VALUE</p>

    <div class="lock-line"></div>

    <p>🔒 OWNED CARDS</p>

    <div class="lock-line"></div>

    <p>🔒 WISHLIST</p>

    <button class="unlock-btn">
        UNLOCK PREMIUM
    </button>

</div>

<div id="cardModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<h2 id="modalName"></h2>
<img id="modalImage">
<p id="modalSet"></p>
<p id="modalNumber"></p>
<p id="modalRarity"></p>
<button class="owned">✓ Owned</button>
</div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const dexNumber = parseInt(params.get("id"));

let pokemonName = "";
let loadedCards = [];

function showCardById(cardId){

    const card = loadedCards.find(
        c => c.cardId === cardId
    );

    if(!card) return;

    showCard(card);
}

async function loadPage(){

    const pokemonResponse =
        await fetch("pokemon.json");

    const pokemon =
        await pokemonResponse.json();

    const currentPokemon =
        pokemon.find(
            p => p.dexNumber === dexNumber
        );

    if(!currentPokemon){

        document.getElementById("title").innerText =
            "Pokémon Not Found";

        return;
    }

    pokemonName = currentPokemon.name;

    document.getElementById("title").innerText =
        pokemonName;

    loadCards();
}

async function loadCards(){

    const response =
        await fetch("data/cards.json");

    const allCards =
        await response.json();

    loadedCards = allCards;

    const cards =
        document.getElementById("cards");

    const matchingCards =
        allCards.filter(card =>

            card.name &&
            card.name.toLowerCase() ===
            pokemonName.toLowerCase()

        );

    matchingCards.forEach(card => {

        cards.innerHTML += `
        <div class="card">

            <img
                src="${card.image}"
                onclick="alert('clicked')"
            >

            <h3>${card.name}</h3>

            <div class="set">
                ${card.set}
            </div>

        </div>
        `;

    });

}

function showCard(card){

    alert(card.name);

    document.getElementById("modalName").innerText =
        card.name;

    document.getElementById("modalImage").src =
        card.largeImage || card.image;

    document.getElementById("modalSet").innerText =
        "Set: " + card.set;

    document.getElementById("modalNumber").innerText =
        "Number: " + card.number;

    document.getElementById("modalRarity").innerText =
        "Rarity: " + (card.rarity || "Unknown");

    document.getElementById("cardModal").style.display =
        "flex";
}

function closeModal(){

    document.getElementById("cardModal").style.display =
        "none";
}

window.onclick = function(event){

    const modal =
        document.getElementById("cardModal");

    if(event.target === modal){

        closeModal();

    }

}

loadPage();

</script>

</body>
</html>
